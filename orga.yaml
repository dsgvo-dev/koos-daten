# Organisationsstruktur
# Gemeindeverwaltung, angelehnt an NKomVG
# Ämterstruktur nach Celle/Springe-Katalog (April 2026)
#
# id:              stabile Kennung — NIEMALS ändern.
# name:            Anzeigename — kann jederzeit geändert werden (nur hier).
# parent:          ID der übergeordneten Einheit (~ = Wurzel).
# rollen:          OE-spezifische Rollen (Freitext).
# sonderfunktionen: Organisationsweit wirksame Funktionen dieser OE.
#
# Rollenmodell:
#   Generisch  → in koos.yaml vokabular.generische-rollen
#   OE-spezif. → rollen:
#   Sonderfkt. → sonderfunktionen:
#
# Reorganisation: parent: einer Einheit ändern — alle Prozessverknüpfungen bleiben unberührt.

name: Gemeindeverwaltung

einheiten:

  # ══════════════════════════════════════════════════════════════════════════
  #  VERWALTUNGSLEITUNG
  # ══════════════════════════════════════════════════════════════════════════

  - id: oe-hvb
    name: Bürgermeister/in (HVB)
    parent: ~
    rollen:
      - Bürgermeister/in (HVB)

  - id: oe-personalrat
    name: Personalrat
    parent: oe-hvb
    rollen:
      - Vorsitzende/r Personalrat
      - Mitglied Personalrat
    hinweis: >
      Eigenständiges Gremium nach NPersVG. Keine Weisungsgebundenheit gegenüber
      der Verwaltungsleitung. Beteiligungsrechte nach §§ 64–66 NPersVG.

  # ── 1.x – Stabsbereiche der Verwaltungsleitung ────────────────────────────

  - id: oe-amt-1-1
    name: 1.1 – Zentrale Steuerung
    parent: oe-hvb
    rollen:
      - Leitung Zentrale Steuerung

  - id: oe-amt-1-2
    name: 1.2 – Gleichstellung
    parent: oe-hvb
    rollen:
      - Gleichstellungsbeauftragte/r
    sonderfunktionen:
      - Gleichstellungsbeauftragte/r              # NGG §3

  - id: oe-amt-1-3
    name: 1.3 – Controlling
    parent: oe-hvb
    rollen:
      - Controller/in

  - id: oe-amt-1-4
    name: 1.4 – Datenschutz
    parent: oe-hvb
    rollen:
      - Datenschutzbeauftragte/r
    sonderfunktionen:
      - Datenschutzbeauftragte/r                  # DSGVO Art. 37, BDSG §38

  - id: oe-amt-1-5
    name: 1.5 – Informationssicherheit
    parent: oe-hvb
    rollen:
      - Informationssicherheitsbeauftragte/r
    sonderfunktionen:
      - Informationssicherheitsbeauftragte/r      # BSI IT-Grundschutz

  - id: oe-amt-1-6
    name: 1.6 – Digitalisierung
    parent: oe-hvb
    rollen:
      - Digitalisierungsbeauftragte/r

  # ── 80 – Wirtschaftsförderung (direkt der Verwaltungsleitung zugeordnet) ──

  - id: oe-amt-80
    name: 80 – Wirtschaftsförderung
    parent: oe-hvb
    rollen:
      - Leitung Wirtschaftsförderung

  # ══════════════════════════════════════════════════════════════════════════
  #  FACHBEREICH 1 – Hauptverwaltung und Steuerung
  #  Ämter: 10 · 11 · 12 · 13 · 14 · 15
  # ══════════════════════════════════════════════════════════════════════════

  - id: oe-fb1
    name: 1 – Hauptverwaltung und Steuerung
    parent: oe-hvb
    rollen:
      - Fachbereichsleitung FB 1

  - id: oe-amt-10
    name: 10 – Hauptamt
    parent: oe-fb1
    rollen:
      - Leitung Hauptamt
      - Sachbearbeitung Hauptamt

  - id: oe-amt-11
    name: 11 – Personalamt
    parent: oe-fb1
    rollen:
      - Leitung Personalamt
      - Personalverwaltung / Sachbearbeitung

  - id: oe-amt-12
    name: 12 – Statistikamt
    parent: oe-fb1
    rollen:
      - Leitung Statistikamt
      - Sachbearbeitung Statistik

  - id: oe-amt-13
    name: 13 – Presseamt
    parent: oe-fb1
    rollen:
      - Pressesprecher/in
      - Sachbearbeitung Presse und Öffentlichkeitsarbeit

  - id: oe-amt-14
    name: 14 – Rechnungsprüfungsamt
    parent: oe-fb1
    rollen:
      - Leitende/r Rechnungsprüfer/in
    sonderfunktionen:
      - Rechnungsprüfung                          # NKomVG §§ 154 ff.

  - id: oe-amt-15
    name: 15 – IT
    parent: oe-fb1
    rollen:
      - Leitung IT
      - IT-Administrator/in

  # ══════════════════════════════════════════════════════════════════════════
  #  FACHBEREICH 2 – Finanzen und Steuern
  #  Ämter: 20 · 21 · 22 · 23
  # ══════════════════════════════════════════════════════════════════════════

  - id: oe-fb2
    name: 2 – Finanzen und Steuern
    parent: oe-hvb
    rollen:
      - Fachbereichsleitung FB 2 (Kämmerei)

  - id: oe-amt-20
    name: 20 – Kasse
    parent: oe-fb2
    rollen:
      - Leitung Kasse (Kassenverwalter/in)
      - Kassensachbearbeitung

  - id: oe-amt-21
    name: 21 – Zwangsvollstreckung
    parent: oe-fb2
    rollen:
      - Leitung Vollstreckung
      - Vollstreckungsbeamte/r

  - id: oe-amt-22
    name: 22 – Steuern und Abgaben
    parent: oe-fb2
    rollen:
      - Leitung Steuern und Abgaben
      - Sachbearbeitung Steuern und Gebühren

  - id: oe-amt-23
    name: 23 – Liegenschaftswesen
    parent: oe-fb2
    rollen:
      - Leitung Liegenschaftswesen
      - Sachbearbeitung Grundstücke und Pachtverträge

  # ══════════════════════════════════════════════════════════════════════════
  #  FACHBEREICH 3 – Recht, Ordnung und Bürgerservice
  #  Ämter: 30 · 31 · 32 · 33 · 34 · 37 · 38
  # ══════════════════════════════════════════════════════════════════════════

  - id: oe-fb3
    name: 3 – Recht, Ordnung und Bürgerservice
    parent: oe-hvb
    rollen:
      - Fachbereichsleitung FB 3

  - id: oe-amt-30
    name: 30 – Rechtsamt
    parent: oe-fb3
    rollen:
      - Leitung Rechtsamt
      - Jurist/in / Sachbearbeitung Recht
    sonderfunktionen:
      - Datenschutz-Rechtsberatung

  - id: oe-amt-31
    name: 31 – Standesamt
    parent: oe-fb3
    rollen:
      - Standesbeamte/r
      - Sachbearbeitung Personenstandswesen

  - id: oe-amt-32
    name: 32 – Ordnungsamt
    parent: oe-fb3
    rollen:
      - Leitung Ordnungsamt
      - Ordnungsbeamte/r (Vollzugsdienst)

  - id: oe-amt-33
    name: 33 – Bürgerservice
    parent: oe-fb3
    rollen:
      - Leitung Bürgerservice
      - Sachbearbeitung Bürgerbüro

  - id: oe-amt-34
    name: 34 – Straßenverkehrsamt
    parent: oe-fb3
    rollen:
      - Leitung Straßenverkehrsamt
      - Sachbearbeitung Fahrerlaubnis und Zulassung

  - id: oe-amt-37
    name: 37 – Feuerwehr
    parent: oe-fb3
